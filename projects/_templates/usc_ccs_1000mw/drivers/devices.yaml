# 1000MW 模板设备白名单。
motor_exclude_common: [动叶, 调节阀, 调门, 风门, 出口, 进口, 气动门, 电动门, 插板,
                       出口风门, 进口风门, 润滑油, 液压油, 油泵, 油箱, 油站,
                       电加热, 加热器, 冷却风, 循环冷却, 失速, 联络]
devices:
