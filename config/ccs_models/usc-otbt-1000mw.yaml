# USC-OTBT 1000MW 协调控制系统模型 (CCS) 参数
# 论文: Fan H., Su Z.-g., Wang P.-h., Lee K.Y.
#       "A dynamic nonlinear model for a wide-load range operation of
#        ultra-supercritical once-through boiler-turbine units"
#       Energy 226 (2021) 120425
# 3 输入 (uB, Dfw, ut) → 3 输出 (pst, hm, Ne); 4 状态 (rB, pm, hm, Ne)
# DSL 调用: CCS_PST(uB, Dfw, ut) / CCS_HM(...) / CCS_NE(...)

meta:
  name: USC-OTBT 1000MW
  source: "Fan/Su/Wang/Lee 2021, Energy 226:120425"
  Ne_range_MW: [330, 1050]    # 论文实测覆盖区间

# ─── 静态参数: y = a·Ne³ + b·Ne² + c·Ne + d  (Ne 单位 MW) ──────────────
# 论文式 (25)(26)(27)(28)(31), 三次多项式拟合
static_poly:
  hfw:   [9.778e-7,   -2.4e-3,    2.27,       449.3   ]   # 给水焓 kJ/kg
  k1:    [-5.55e-5,    0.12,     -84.87,    35634.5   ]   # 单位煤热 kJ/kg
  k2:    [2.341e-13,  -6.56e-10,  7.15e-7,    3.02e-4 ]   # 汽轮机系数
  lam:   [-1.383e-10,  1.314e-7,  1.578e-4,   1.116   ]   # 主汽焓/分离器焓比
  alpha: [-2.24e-8,    5.182e-5, -3.851e-2,  16.075   ]   # 水煤比 Dfw/rB

# ─── 动态参数 (论文 5.3 节) ────────────────────────────────────────────
dyn:
  c0:  380     # 制粉惯性时间 s
  c3:   40     # 汽轮机惯性时间 s
  tau:  20     # 制粉纯延迟 s
  cj:   0.46   # 金属比热 kJ/(kg·℃)
  mj:  700000  # 金属质量 kg
  Vm:  639     # 锅炉容积 m³

# ─── 能量错配函数 + 节流损失 (论文 5.4 节) ─────────────────────────────
energy:
  mu:    334496.1     # 能量错配增益
  gamma:    171.4     # 能量错配偏置 (Ne+γ 分母防 0)
  eta:        8       # 节流损失系数

# ─── 蒸汽热力性质回归式 ────────────────────────────────────────────────
steam:
  # 主蒸汽压降 Δp = a·pm + b  (论文式 29, R²=0.998)
  dp:
    a: 0.0522
    b: -0.00281
  # 过热蒸汽流量 Dst = ut · (a·pst / (hst + b))  (论文式 30)
  Dst:
    a: 145191.5
    b: -199.47
  # 分离器蒸汽密度 ρm = a·pm·hm + b·hm + c·pm + d  (论文 c1/c2 公式里隐含的拟合)
  rho_m:
    a: -0.005248
    b: -0.003204
    c: 19.7835
    d: 9.7266
  # 分离器温度偏导 ∂Tm/∂hm = a·pm + b  (论文 d1 公式里出现, 与 ∂ρm/∂hm 配对)
  T_m_dh:
    a: 0.0018113
    b: 0.2012
  # 分离器温度偏导 ∂Tm/∂pm = a·hm + b  (论文 d2 公式里出现, 与 ∂ρm/∂pm 配对)
  T_m_dp:
    a: 0.0018113
    b: 11.143

# ─── 输入约束 (论文 5.5 节, 安全/经济考量) ─────────────────────────────
limits:
  uB:       [30, 120]      # 煤量 kg/s
  ut:       [0.5, 1.0]     # 调门开度
  # |Dfw - α·rB| ≤ Dfw_band_from_arB; α·rB 为水煤比稳态参考给水流量
  Dfw_band_from_arB: 50    # kg/s

# ─── 初始稳态种子 (Table 2 的 600.9MW 行, THA 工况附近) ─────────────────
# 模型首次实例化 / reset() 时用; 与现工程实际稳态不一致时,
# CCS_* 函数首周期会以这些值起步, 之后跟着输入收敛
seed:
  Ne0:  600.9    # MW
  uB0:   65.5    # kg/s
  Dfw0: 452.8    # kg/s
  ut0:    0.6733
  hm0:  2880.6   # kJ/kg
  pm0:   16.462  # MPa
