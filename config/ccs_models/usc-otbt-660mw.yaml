# USC-OTBT 660MW 协调控制系统模型 (CCS) 参数
# 来源说明:
#   模型动态结构来自 Fan/Su/Wang/Lee 2021 USC-OTBT 方程。
#   YQ3 适配层采用现场静态曲线: NE-uB、NE-PST、NE-DFW。
#   本 preset 优先保证 200-600MW 段静态曲线准确; 过热度 30℃仅记录为
#   后续 HM/温度校准目标, 本轮不从温度反推焓。
#
# 论文结构:
#   Fan H., Su Z.-g., Wang P.-h., Lee K.Y.
#   "A dynamic nonlinear model for a wide-load range operation of
#    ultra-supercritical once-through boiler-turbine units"
#   Energy 226 (2021) 120425
#
# 660MW 参考文献:
#   Zhao et al., Applied Energy 2018, 660MW supercritical once-through boiler
#   Liu et al., Energy 2025, 660MW supercritical deep peak shaving
#
# 3 输入 (uB, Dfw, ut) → 3 输出 (pst, hm, Ne); 4 状态 (rB, pm, hm, Ne)
# DSL 调用: $YQ3 = CCS_660(uB, Dfw, ut); $YQ3.PST / $YQ3.HM / $YQ3.NE

meta:
  name: YQ3 USC-OTBT 660MW curve-calibrated preset
  source: "Fan/Su/Wang/Lee 2021 model structure + YQ3 static curves"
  Ne_range_MW: [198, 693]    # 约 30%~105% 660MW 机组负荷范围
  scale_from_1000mw: 0.66
  calibration_status: "YQ3 static curve calibrated for 200-600MW"

# YQ3 静态曲线校准层
# - 曲线点来自现场静态曲线截图
# - uB / Dfw 原始单位为 t/h, 模型内部仍用 kg/s
# - 200-600MW 为主要精度区间; 区间外端点钳位, 不做高阶外推
yq3_static_curves:
  valid_ne_range: [200, 600]
  ut_nominal: 0.70
  superheat_target_c: 30
  tau_ne: 40
  tau_pst: 40
  ne_to_ub_tph:
    - [0, 0]
    - [198, 83]
    - [231, 96]
    - [330, 132.3]
    - [495, 182.4]
    - [600, 217.1]
    - [660, 236.92]
    - [700, 252.7]
  ne_to_pst_mpa:
    - [0, 8.5]
    - [198, 8.5]
    - [231, 10.3]
    - [270, 12.4]
    - [330, 13.9]
    - [396, 16.4]
    - [450, 18.4]
    - [528, 21.6]
    - [600, 23.9]
    - [660, 25.0]
  ne_to_dfw_tph:
    - [132, 1045]
    - [242, 1100]
    - [330, 1118]
    - [495, 1220]
    - [660, 1300]

# 静态参数: y = a·Ne³ + b·Ne² + c·Ne + d  (Ne 单位 MW)
# 保留 1000MW 论文回归。YQ3 当前关心的 330~660MW 区间仍在原论文实测范围内。
static_poly:
  hfw:   [9.778e-7,   -2.4e-3,    2.27,       449.3   ]   # 给水焓 kJ/kg
  k1:    [-5.55e-5,    0.12,     -84.87,    35634.5   ]   # 单位煤热 kJ/kg
  k2:    [2.341e-13,  -6.56e-10,  7.15e-7,    3.02e-4 ]   # 汽轮机系数
  lam:   [-1.383e-10,  1.314e-7,  1.578e-4,   1.116   ]   # 主汽焓/分离器焓比
  alpha: [-2.24e-8,    5.182e-5, -3.851e-2,  16.075   ]   # 水煤比 Dfw/rB

# 动态参数
# c0/c3/tau 保留原动态时间尺度; mj/Vm 为库存量, 按 0.66 缩放。
dyn:
  c0:  380       # 制粉惯性时间 s
  c3:   40       # 汽轮机惯性时间 s
  tau:  20       # 制粉纯延迟 s
  cj:   0.46     # 金属比热 kJ/(kg·℃)
  mj:  462000    # 金属质量 kg = 700000 * 0.66
  Vm:     421.74 # 锅炉容积 m³ = 639 * 0.66

# 能量错配函数 + 节流损失
# 先保留原回归增益, 避免在无 YQ3 趋势数据时同时改静态与动态灵敏度。
energy:
  mu:    334496.1
  gamma:    171.4
  eta:        8

# 蒸汽热力性质回归式
steam:
  dp:
    a: 0.0522
    b: -0.00281
  Dst:
    a: 145191.5
    b: -199.47
  rho_m:
    a: -0.005248
    b: -0.003204
    c: 19.7835
    d: 9.7266
  T_m_dh:
    a: 0.0018113
    b: 0.2012
  T_m_dp:
    a: 0.0018113
    b: 11.143

# 输入约束
limits:
  uB:       [20, 80]       # 煤量 kg/s, 660MW 工程范围
  ut:       [0.5, 1.0]     # 调门开度
  Dfw_band_from_arB: 33    # kg/s, 约 50 * 0.66

# 初始稳态种子
# 按 YQ3 静态曲线 600MW 工况给定; 上载后仍会锚到工程当前实际值。
seed:
  Ne0:  600.0    # MW
  uB0:   60.3055555556  # kg/s = 217.1 t/h
  Dfw0: 353.0303030303  # kg/s = 1270.909 t/h
  ut0:    0.70
  hm0:  2880.6   # kJ/kg
  pm0:   25.2130618274  # MPa, 对应 pst=23.9MPa
