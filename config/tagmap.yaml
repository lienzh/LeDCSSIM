# MVP 测点映射表 - 在线模式才用,离线模式留空也可
#
# 字段:
#   tag          模型内部名(必填),用 'block.port' 格式与 GraphRunner 端口对应
#   opc_node     OPC UA 节点 ID(必填)
#   direction    in / out
#   dtype        Float / Bool / Int
#   range_low/range_high  量程(可选,MVP 阶段未做线性换算)
#   write_mode   ai_hr_lr 表示走 AI HR/LR 双写方案
#   channel_base ai_hr_lr 模式必填,为不含 .PV 的通道路径
#
# === MVP 离线场景下,本文件可以为空 ===
# 下面示例是在线模式的最小配置,启 NTVDPU 后参考填写真实节点
tags: []

