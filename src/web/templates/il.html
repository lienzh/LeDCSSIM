{% extends "base.html" %}
{% set active_page = "il" %}
{% block title %}IL 层 - 预处理 - LeDCSsim{% endblock %}

{% block content %}
<div class="canvas-page">
  <div class="canvas-toolbar" id="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-title">IL 层 - 信号预处理</span>
      <div class="toolbar-sep"></div>
      <input type="text" class="toolbar-input" id="modelName" value="IL_preprocess" placeholder="配置名称">
      <button class="toolbar-btn" onclick="saveModel()">&#128190; 保存</button>
      <button class="toolbar-btn" onclick="loadModel()">&#128194; 加载</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="engine.undo()">&#8630;</button>
      <button class="toolbar-btn" onclick="engine.redo()">&#8631;</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="engine.zoomIn()">&#43;</button>
      <button class="toolbar-btn" onclick="engine.zoomOut()">&#8722;</button>
      <button class="toolbar-btn" onclick="engine.zoomReset()">1:1</button>
    </div>
    <div class="toolbar-right">
      <span class="zoom-indicator" id="zoomLabel">100%</span>
    </div>
  </div>

  <div class="canvas-body canvas-two-col">
    <div class="block-palette" id="palette">
      <div class="palette-search">
        <input type="text" class="form-control" placeholder="搜索功能块..." oninput="filterBlocks(this.value)">
      </div>
      <div class="palette-content" id="paletteContent">加载中...</div>
    </div>

    <div class="canvas-area grid-dots" id="canvasArea">
      <div id="drawflow"></div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let engine = null;
let blockDefs = [];
let categories = [];

document.addEventListener('DOMContentLoaded', async () => {
  engine = new CanvasEngine('drawflow', { grid: 'dots', mode: 'config' });

  try {
    const [blocksData, catsData] = await Promise.all([
      api('/api/blocks'),
      api('/api/blocks/categories'),
    ]);
    blockDefs = blocksData;
    categories = catsData;
    blockDefs.forEach(b => engine.registerBlock(b));
    renderPalette();
  } catch(e) { console.error('初始化失败:', e); }

  engine.enableInspector();

  // 自动加载
  try {
    const d = await api('/api/model/load/' + (document.getElementById('modelName').value.trim() || 'IL_preprocess'));
    if (d.drawflow) engine.importJSON(d.drawflow);
  } catch(e) {}

  const canvas = document.getElementById('canvasArea');
  canvas.addEventListener('drop', (ev) => {
    ev.preventDefault();
    const blockId = ev.dataTransfer.getData('blockId');
    if (!blockId) return;
    const rect = document.getElementById('drawflow').getBoundingClientRect();
    engine.addBlock(blockId, ev.clientX - rect.left, ev.clientY - rect.top);
  });
  canvas.addEventListener('dragover', (e) => e.preventDefault());

  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveModel(); }
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); engine.undo(); }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); engine.redo(); }
    if (e.key === 'Delete') { engine.removeSelected(); }
  });
});

// ── 面板（与 IB 共用逻辑）──
function renderPalette() {
  const grouped = {};
  categories.forEach(c => { grouped[c.id] = { cat: c, blocks: [] }; });
  blockDefs.forEach(b => {
    const cid = b.category || 'signal';
    if (!grouped[cid]) grouped[cid] = { cat: {id:cid,name:cid,color:'#64748b'}, blocks: [] };
    grouped[cid].blocks.push(b);
  });
  document.getElementById('paletteContent').innerHTML = Object.entries(grouped)
    .filter(([_,g]) => g.blocks.length > 0)
    .map(([catId, g]) => `
      <div class="palette-category">
        <div class="palette-category-title" onclick="this.parentElement.classList.toggle('collapsed')">
          <span class="palette-arrow">&#9660;</span>
          <span style="color:${g.cat.color}">&#9632;</span> ${g.cat.name}
          <span class="palette-count">${g.blocks.length}</span>
        </div>
        <div class="palette-items">
          ${g.blocks.map(b => `
            <div class="palette-block" draggable="true" ondragstart="dragBlock(event,'${b.id}')"
                 title="${b.description||b.name}" data-search="${b.id} ${b.name} ${b.description||''}">
              <span class="palette-block-id" style="color:${g.cat.color}">${b.id}</span>
              <span class="palette-block-name">${b.name}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
}

function dragBlock(ev, id) { ev.dataTransfer.setData('blockId', id); }
function filterBlocks(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.palette-block').forEach(el => {
    el.style.display = (!q || (el.dataset.search||'').toLowerCase().includes(q)) ? '' : 'none';
  });
}

async function saveModel() {
  const name = document.getElementById('modelName').value.trim() || 'IL_preprocess';
  await api('/api/model/save', { method:'POST', body:{ name, drawflow: engine.exportJSON(), layer:'IL' }});
  showToast(`"${name}" 已保存`, 'success');
}
async function loadModel() {
  const name = document.getElementById('modelName').value.trim() || 'IL_preprocess';
  try {
    const d = await api(`/api/model/load/${name}`);
    if (d.drawflow) { engine.importJSON(d.drawflow); showToast('已加载', 'success'); }
  } catch(e) { showToast('未找到', 'info'); }
}
</script>
{% endblock %}
