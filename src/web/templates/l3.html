{% extends "base.html" %}
{% set active_page = "l3" %}
{% block title %}L3 层 - 封装库 - LeDCSsim{% endblock %}

{% block content %}
<div class="canvas-page">
  <div class="canvas-toolbar">
    <div class="toolbar-left">
      <span class="toolbar-title">L3 层 - 封装库</span>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="createNewBlock()">&#10010; 新建</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="engine.undo()">&#8630;</button>
      <button class="toolbar-btn" onclick="engine.redo()">&#8631;</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="engine.zoomIn()">&#43;</button>
      <button class="toolbar-btn" onclick="engine.zoomOut()">&#8722;</button>
      <button class="toolbar-btn" onclick="engine.zoomReset()">1:1</button>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-btn" onclick="saveCurrentBlock()">&#128190; 保存</button>
      <span class="zoom-indicator" id="zoomLabel">100%</span>
    </div>
  </div>

  <div class="canvas-body">
    <!-- 封装库列表 -->
    <div class="block-palette" id="palette" style="width:200px;">
      <div class="palette-search" style="padding:12px;">
        <strong style="font-size:13px;">封装块列表</strong>
        <button class="btn btn-primary btn-sm" style="width:100%;margin-top:8px;" onclick="createNewBlock()">新建封装块</button>
      </div>
      <div class="palette-content" id="libList" style="padding:4px 8px;">加载中...</div>
    </div>

    <!-- 画布区 -->
    <div class="canvas-area grid-dots" id="canvasArea">
      <div id="drawflow"></div>
    </div>

    <!-- 功能块面板 + 信息 -->
    <div class="properties-panel" id="propsPanel" style="width:260px;">
      <div class="props-header" id="editorTitle">选择封装块</div>
      <div class="props-body">
        <!-- 端口块（始终置顶） -->
        <div class="props-section-title">端口</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;">
          <div class="palette-block-mini" draggable="true" ondragstart="drag(event,'port_in')" title="输入端口">IN</div>
          <div class="palette-block-mini" draggable="true" ondragstart="drag(event,'port_out')" title="输出端口">OUT</div>
        </div>

        <!-- 完整功能块列表 -->
        <div class="props-section-title">功能块</div>
        <div id="fullBlockList" style="max-height:300px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;">
          加载中...
        </div>

        <!-- 封装块信息 -->
        <div id="blockInfo">
          <p style="color:var(--text-light);font-size:12px;">从左侧选择封装块，或新建一个。</p>
        </div>
      </div>
      <div class="props-footer">
        <div class="props-section-title">层间跳转</div>
        <a href="/ib" class="props-link">IB 层 - 使用封装块</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let engine = null;
let currentBlockName = '';
let allBlocks = [];

// 端口块定义（L3 专用）
const portBlocks = {
  port_in:  {id:'port_in',  name:'输入端口', category:'signal', inputs:0, outputs:1, params:[{key:'name',label:'端口名',type:'string',default:''},{key:'unit',label:'单位',type:'string',default:''}]},
  port_out: {id:'port_out', name:'输出端口', category:'signal', inputs:1, outputs:0, params:[{key:'name',label:'端口名',type:'string',default:''},{key:'unit',label:'单位',type:'string',default:''}]},
};

document.addEventListener('DOMContentLoaded', async () => {
  engine = new CanvasEngine('drawflow', { grid: 'dots', mode: 'config' });
  Object.values(portBlocks).forEach(b => engine.registerBlock(b));

  // 从 API 加载完整功能块库
  try {
    allBlocks = await api('/api/blocks');
    allBlocks.forEach(b => engine.registerBlock(b));
    // 渲染功能块面板
    const listEl = document.getElementById('fullBlockList');
    listEl.innerHTML = allBlocks.map(b =>
      `<div class="palette-block-mini" draggable="true" ondragstart="drag(event,'${b.id}')" title="${b.description||b.name}">${b.id}</div>`
    ).join('');
  } catch(e) {
    document.getElementById('fullBlockList').innerHTML = '<span style="color:var(--text-light);font-size:11px;">加载失败</span>';
  }

  const canvas = document.getElementById('canvasArea');
  canvas.addEventListener('drop', (ev) => {
    ev.preventDefault();
    const bid = ev.dataTransfer.getData('blockId');
    if (!bid) return;
    const rect = document.getElementById('drawflow').getBoundingClientRect();
    engine.addBlock(bid, ev.clientX - rect.left, ev.clientY - rect.top);
  });
  canvas.addEventListener('dragover', e => e.preventDefault());

  await loadLibrary();
  await loadPresets();

  // 从 URL 参数自动选择封装块
  const urlParams = new URLSearchParams(window.location.search);
  const blockParam = urlParams.get('block');
  if (blockParam) {
    await selectBlock(blockParam);
  }
});

function drag(ev, id) { ev.dataTransfer.setData('blockId', id); }

// ── 封装库管理 ──
let libData = [];
async function loadLibrary() {
  try {
    const models = await api('/api/model/list');
    libData = models.filter(m => m.name.startsWith('L3_'));
    renderLibList();
  } catch(e) {}
}

function renderLibList() {
  const el = document.getElementById('libList');
  if (libData.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:var(--text-light);text-align:center;font-size:12px;">暂无封装块</div>';
    return;
  }
  el.innerHTML = libData.map(m => {
    const name = m.name.replace('L3_', '');
    const active = m.name === currentBlockName ? ' active' : '';
    return `<div class="lib-item${active}" onclick="selectBlock('${m.name}')">
      <div style="font-weight:600;font-size:13px;">${name}</div>
      <div style="font-size:10px;color:var(--text-light);">封装模型</div>
    </div>`;
  }).join('');
}

async function selectBlock(name) {
  currentBlockName = name;
  renderLibList();
  try {
    const d = await api(`/api/model/load/${name}`);
    if (d.drawflow) engine.importJSON(d.drawflow);
    document.getElementById('editorTitle').textContent = name.replace('L3_', '');
    updateBlockInfo(d);
  } catch(e) {}
}

function updateBlockInfo(data) {
  const exported = engine.exportJSON();
  const nodes = exported?.drawflow?.Home?.data || {};
  const inputs = [], outputs = [];
  Object.values(nodes).forEach(n => {
    if (n.name === 'port_in')  inputs.push(n.data?.name || '?');
    if (n.name === 'port_out') outputs.push(n.data?.name || '?');
  });
  document.getElementById('blockInfo').innerHTML = `
    <div class="props-section-title">接口端口</div>
    ${inputs.map(n => `<div style="font-size:12px;"><span style="color:#10b981;">&#9654;</span> IN: ${n}</div>`).join('')}
    ${outputs.map(n => `<div style="font-size:12px;"><span style="color:#3b82f6;">&#9654;</span> OUT: ${n}</div>`).join('')}
    ${(!inputs.length && !outputs.length) ? '<div style="font-size:11px;color:var(--text-light);">拖入 IN/OUT 端口定义接口</div>' : ''}
    <div class="form-group" style="margin-top:12px;">
      <label style="font-size:11px;">描述</label>
      <textarea class="form-control" id="blockDesc" rows="2" style="font-size:12px;">${data.description || ''}</textarea>
    </div>
  `;
}

async function saveCurrentBlock() {
  if (!currentBlockName) { showToast('请先选择或新建', 'error'); return; }
  const desc = document.getElementById('blockDesc')?.value || '';
  await api('/api/model/save', { method:'POST', body:{
    name: currentBlockName, drawflow: engine.exportJSON(), layer:'L3', description: desc
  }});
  showToast('已保存', 'success');
}

function createNewBlock() {
  const name = prompt('封装块名称（英文）：');
  if (!name) return;
  const fullName = 'L3_' + name.replace(/^L3_/, '');
  currentBlockName = fullName;
  engine._editor.clear();
  document.getElementById('editorTitle').textContent = name;
  document.getElementById('blockInfo').innerHTML = `
    <div style="font-size:11px;color:var(--text-light);">
      拖入 IN/OUT 端口定义接口，用基础块构建内部逻辑。
    </div>
    <div class="form-group" style="margin-top:8px;">
      <label style="font-size:11px;">描述</label>
      <textarea class="form-control" id="blockDesc" rows="2" style="font-size:12px;"></textarea>
    </div>
  `;
  libData.push({name: fullName});
  renderLibList();
}

// ── 预置封装块 ──
async function loadPresets() {
  try {
    const models = await api('/api/model/list');
    const names = models.map(m => m.name);
    if (!names.includes('L3_boiler_thermal') || !names.includes('L3_turbine_power')) {
      // 预置块在首次创建后已存在，无需重建
    }
    await loadLibrary();
  } catch(e) {}
}
</script>

<style>
.lib-item {
  padding:10px 12px; border:1px solid var(--border); border-radius:6px;
  margin-bottom:6px; cursor:pointer; transition:.15s;
}
.lib-item:hover { border-color:var(--primary); background:var(--primary-light); }
.lib-item.active { border-color:var(--primary); background:var(--primary-light); font-weight:600; }
.palette-block-mini {
  padding:4px 8px; background:var(--card-bg); border:1px solid var(--border);
  border-radius:4px; font-size:11px; font-weight:600; cursor:grab;
  font-family:monospace; text-align:center; min-width:36px;
}
.palette-block-mini:hover { border-color:var(--primary); background:var(--primary-light); }
</style>
{% endblock %}
