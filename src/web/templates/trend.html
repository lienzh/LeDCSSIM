{% extends "base.html" %}
{% set active_page = "trend" %}
{% block title %}曲线趋势 - LeDCSsim{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<div style="padding:16px 24px; height:calc(100vh - 52px); display:flex; flex-direction:column; overflow:hidden;">
  <!-- 顶部工具栏 -->
  <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-shrink:0; flex-wrap:wrap;">
    <h2 style="font-size:16px; font-weight:600; margin:0;">曲线趋势</h2>
    <span id="trend-status" style="font-size:11px; color:#94a3b8; font-family:Consolas,monospace;"></span>
    <div style="flex:1;"></div>
    <label style="font-size:11px; color:#64748b;">刷新间隔:</label>
    <select id="refresh-interval" style="padding:3px 6px; border:1px solid #e2e8f0; border-radius:4px; font-size:11px;">
      <option value="500">500ms</option>
      <option value="1000" selected>1s</option>
      <option value="2000">2s</option>
      <option value="0">手动</option>
    </select>
    <button onclick="fetchOnce()" style="padding:4px 10px; border:1px solid #e2e8f0; border-radius:4px; font-size:11px; cursor:pointer; background:#fff;">刷新</button>
    <button onclick="clearChart()" style="padding:4px 10px; border:1px solid #e2e8f0; border-radius:4px; font-size:11px; cursor:pointer; background:#fff;">清空</button>
  </div>

  <!-- 主体：左侧变量选择 + 右侧曲线 -->
  <div style="flex:1; display:flex; gap:12px; min-height:0;">

    <!-- 左侧：变量选择面板 -->
    <div style="width:240px; flex-shrink:0; border:1px solid #e2e8f0; border-radius:4px; display:flex; flex-direction:column; overflow:hidden;">
      <div style="padding:8px 10px; border-bottom:1px solid #e2e8f0; font-size:12px; font-weight:600;">
        变量选择
        <span id="sel-count" style="font-weight:400; color:#94a3b8;"></span>
      </div>
      <div style="padding:6px 8px; border-bottom:1px solid #e2e8f0;">
        <input type="text" id="var-filter" placeholder="搜索..." style="width:100%; padding:4px 8px; border:1px solid #e2e8f0; border-radius:4px; font-size:11px; box-sizing:border-box;">
      </div>
      <div id="var-list" style="flex:1; overflow-y:auto; padding:4px 0;"></div>
    </div>

    <!-- 右侧：曲线区域 -->
    <div style="flex:1; border:1px solid #e2e8f0; border-radius:4px; padding:8px; min-width:0; display:flex; flex-direction:column;">
      <!-- Y 轴配置条 -->
      <div id="axis-bar" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px; min-height:20px;"></div>
      <div style="flex:1; position:relative; min-height:0;">
        <canvas id="trend-chart"></canvas>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ── 状态 ──
let allVariables = [];
let selectedTags = [];       // 当前选中的 tag 列表
let axisAssignment = {};     // tag -> axisIndex (0=左Y1, 1=右Y2, 2=右Y3...)
let trendChart = null;
let pollTimer = null;

// 预定义轴颜色
const AXIS_COLORS = [
  '#1e293b', '#dc2626', '#2563eb', '#059669', '#d97706', '#7c3aed', '#db2777', '#0891b2'
];
// 每条线的颜色（按顺序分配）
const LINE_COLORS = [
  '#1e293b', '#dc2626', '#2563eb', '#059669', '#d97706', '#7c3aed', '#db2777', '#0891b2',
  '#4f46e5', '#0d9488', '#ea580c', '#9333ea', '#e11d48', '#0284c7'
];

// ── 初始化 Chart.js ──
function initChart() {
  const ctx = document.getElementById('trend-chart').getContext('2d');
  trendChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11, family: 'Consolas, monospace' }, usePointStyle: true, pointStyle: 'line' } },
        tooltip: { callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + (ctx.parsed.y !== null ? ctx.parsed.y.toFixed(3) : '-'); } } }
      },
      scales: {
        x: { title: { display: true, text: '时间 (s)', font: { size: 11 } }, ticks: { font: { size: 10 }, maxTicksLimit: 15 } }
      }
    }
  });
}

// ── 加载变量列表 ──
async function loadVariables() {
  const resp = await api('/api/variables');
  allVariables = resp.variables || [];
  renderVarList();
}

function renderVarList() {
  const query = (document.getElementById('var-filter').value || '').toLowerCase();
  const container = document.getElementById('var-list');

  const filtered = allVariables.filter(v => {
    if (!query) return true;
    return (v.tag || '').toLowerCase().includes(query) ||
           (v.name || '').toLowerCase().includes(query);
  });

  container.innerHTML = filtered.map(v => {
    const checked = selectedTags.includes(v.tag);
    const idx = selectedTags.indexOf(v.tag);
    const color = checked ? LINE_COLORS[idx % LINE_COLORS.length] : '#94a3b8';
    return `<div style="display:flex; align-items:center; gap:6px; padding:4px 10px; cursor:pointer; font-size:11px; ${checked ? 'background:#f0f9ff;' : ''}"
                 onclick="toggleVar('${esc(v.tag)}')">
      <input type="checkbox" ${checked ? 'checked' : ''} style="margin:0; accent-color:${color};">
      <span style="font-family:Consolas,monospace; font-weight:600; color:${color};">${esc(v.tag)}</span>
      <span style="color:#94a3b8; font-size:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(v.name || '')}</span>
    </div>`;
  }).join('');

  document.getElementById('sel-count').textContent = selectedTags.length > 0 ? `(${selectedTags.length})` : '';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function toggleVar(tag) {
  const idx = selectedTags.indexOf(tag);
  if (idx >= 0) {
    selectedTags.splice(idx, 1);
    delete axisAssignment[tag];
  } else {
    selectedTags.push(tag);
    // 默认分配到 Y1 轴
    axisAssignment[tag] = 0;
  }
  renderVarList();
  renderAxisBar();
  rebuildChart();
}

// ── Y 轴配置条 ──
function renderAxisBar() {
  const bar = document.getElementById('axis-bar');
  if (selectedTags.length === 0) {
    bar.innerHTML = '<span style="font-size:11px; color:#94a3b8;">选择左侧变量后显示曲线</span>';
    return;
  }

  bar.innerHTML = selectedTags.map((tag, i) => {
    const color = LINE_COLORS[i % LINE_COLORS.length];
    const axIdx = axisAssignment[tag] || 0;
    return `<span style="display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border:1px solid #e2e8f0; border-radius:3px; font-size:10px; background:#fff;">
      <span style="width:8px; height:3px; background:${color}; display:inline-block;"></span>
      <span style="font-family:Consolas,monospace; font-weight:600;">${esc(tag)}</span>
      <select onchange="setAxis('${esc(tag)}', this.value)" style="border:none; font-size:10px; padding:0; background:transparent; cursor:pointer;">
        <option value="0" ${axIdx===0?'selected':''}>Y1(左)</option>
        <option value="1" ${axIdx===1?'selected':''}>Y2(右)</option>
        <option value="2" ${axIdx===2?'selected':''}>Y3(右)</option>
      </select>
    </span>`;
  }).join('');
}

function setAxis(tag, axIdx) {
  axisAssignment[tag] = parseInt(axIdx);
  rebuildChart();
}

// ── 重建 Chart 结构 ──
function rebuildChart() {
  if (!trendChart) return;

  // 收集使用中的轴
  const usedAxes = new Set();
  selectedTags.forEach(tag => usedAxes.add(axisAssignment[tag] || 0));

  // 构建 scales
  const scales = {
    x: trendChart.options.scales.x
  };

  const axisIds = ['y', 'y1', 'y2'];
  const axisPositions = ['left', 'right', 'right'];

  usedAxes.forEach(idx => {
    const id = axisIds[idx] || 'y' + idx;
    scales[id] = {
      type: 'linear',
      position: axisPositions[idx] || 'right',
      display: true,
      title: { display: false },
      ticks: { font: { size: 10 }, color: AXIS_COLORS[idx] },
      grid: { drawOnChartArea: idx === 0 }  // 只有左轴画网格线
    };
  });

  trendChart.options.scales = scales;

  // 重建 datasets
  trendChart.data.datasets = selectedTags.map((tag, i) => {
    const axIdx = axisAssignment[tag] || 0;
    const color = LINE_COLORS[i % LINE_COLORS.length];
    return {
      label: tag,
      data: [],
      borderColor: color,
      backgroundColor: color,
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0,
      yAxisID: axisIds[axIdx] || 'y' + axIdx,
    };
  });

  trendChart.data.labels = [];
  trendChart.update('none');
}

// ── 数据获取 ──
async function fetchOnce() {
  if (selectedTags.length === 0) return;

  try {
    const tagsParam = selectedTags.join(',');
    const resp = await fetch(`/api/trend/data?tags=${encodeURIComponent(tagsParam)}&n=500`);
    const data = await resp.json();

    // 更新状态
    const statusEl = document.getElementById('trend-status');
    if (data.running) {
      statusEl.textContent = `运行中 t=${(data.sim_time||0).toFixed(1)}s`;
      statusEl.style.color = '#059669';
    } else {
      statusEl.textContent = data.timestamps.length > 0 ? '已停止' : '未运行';
      statusEl.style.color = '#94a3b8';
    }

    if (!data.timestamps || data.timestamps.length === 0) return;

    // 更新曲线数据
    trendChart.data.labels = data.timestamps.map(t => t.toFixed(1));

    selectedTags.forEach((tag, i) => {
      if (trendChart.data.datasets[i]) {
        trendChart.data.datasets[i].data = data.series[tag] || [];
      }
    });

    trendChart.update('none');
  } catch(e) {
    // 网络错误静默忽略
  }
}

// ── 轮询控制 ──
function startPolling() {
  stopPolling();
  const interval = parseInt(document.getElementById('refresh-interval').value);
  if (interval > 0) {
    fetchOnce();
    pollTimer = setInterval(fetchOnce, interval);
  }
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function clearChart() {
  if (!trendChart) return;
  trendChart.data.labels = [];
  trendChart.data.datasets.forEach(ds => { ds.data = []; });
  trendChart.update('none');
}

// ── 事件绑定 ──
document.getElementById('var-filter').addEventListener('input', renderVarList);
document.getElementById('refresh-interval').addEventListener('change', startPolling);

// ── 初始化 ──
initChart();
loadVariables();
renderAxisBar();
startPolling();
</script>
{% endblock %}
