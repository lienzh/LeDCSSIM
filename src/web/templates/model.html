{% extends "base.html" %}
{% set active_page = "model" %}
{% block title %}模型组态 - LeDCSsim{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.css">
<style>
  /* 页面特殊布局：去掉page-body内边距 */
  .model-page .page-body { padding: 0; }
</style>
{% endblock %}

{% block content %}
<div class="model-page">
  <div class="page-header" style="padding: 12px 20px;">
    <div style="display:flex; align-items:center; gap:16px;">
      <h2 style="font-size:16px;">模型组态</h2>
      <span style="color:var(--text-light); font-size:12px;">拖拽左侧功能块到画布，连线构建模型</span>
    </div>
    <div class="btn-group">
      <input type="text" class="form-control" id="modelName" value="CCS_model"
             style="width:140px; font-size:12px;" placeholder="模型名称">
      <button class="btn btn-outline btn-sm" onclick="clearCanvas()">清空</button>
      <button class="btn btn-outline btn-sm" onclick="loadModel()">加载</button>
      <button class="btn btn-primary btn-sm" onclick="saveModel()">保存</button>
    </div>
  </div>

  <div class="page-body">
    <div class="model-layout">
      <!-- 左侧：功能块面板 -->
      <div class="block-palette" id="palette">
        <div style="margin-bottom:10px;">
          <input type="text" class="form-control" placeholder="搜索功能块..."
                 style="font-size:12px; padding:6px 10px;" oninput="filterBlocks(this.value)">
        </div>
        <div id="paletteContent">加载中...</div>
      </div>

      <!-- 中间：画布 -->
      <div class="canvas-area">
        <div id="drawflow"></div>
      </div>

      <!-- 右侧：属性面板 -->
      <div class="properties-panel">
        <h4>属性</h4>
        <div id="propsContent">
          <div class="prop-empty">选中一个功能块<br>查看和编辑其参数</div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.js"></script>
<script>
// ── 全局变量 ──
let editor = null;
let blockTypes = [];
let selectedNodeId = null;

// 分类颜色
const catColors = {
  signal: '#10b981',
  math: '#f59e0b',
  dynamic: '#3b82f6',
  nonlinear: '#8b5cf6',
  function: '#ec4899',
};

const catNames = {
  signal: '信号',
  math: '运算',
  dynamic: '动态环节',
  nonlinear: '非线性',
  function: '函数',
};

// ── 初始化 Drawflow ──
async function init() {
  const container = document.getElementById('drawflow');
  editor = new Drawflow(container);
  editor.reroute = true;
  editor.start();

  // 加载功能块定义
  blockTypes = await api('/api/blocks');
  renderPalette(blockTypes);

  // 事件监听
  editor.on('nodeSelected', (nodeId) => {
    selectedNodeId = nodeId;
    showProperties(nodeId);
  });

  editor.on('nodeUnselected', () => {
    selectedNodeId = null;
    document.getElementById('propsContent').innerHTML =
      '<div class="prop-empty">选中一个功能块<br>查看和编辑其参数</div>';
  });

  editor.on('nodeRemoved', () => {
    selectedNodeId = null;
  });
}

// ── 渲染功能块面板 ──
function renderPalette(blocks) {
  const grouped = {};
  blocks.forEach(b => {
    if (!grouped[b.category]) grouped[b.category] = [];
    grouped[b.category].push(b);
  });

  const el = document.getElementById('paletteContent');
  el.innerHTML = Object.entries(grouped).map(([cat, items]) => `
    <div class="palette-category">
      <div class="palette-category-title">${catNames[cat] || cat}</div>
      ${items.map(b => `
        <div class="palette-block cat-${cat}" draggable="true"
             ondragstart="dragBlock(event, '${b.id}')">
          <span class="block-icon"></span>${b.name}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function filterBlocks(q) {
  q = q.toLowerCase();
  const filtered = q ? blockTypes.filter(b =>
    b.name.includes(q) || b.id.toLowerCase().includes(q)
  ) : blockTypes;
  renderPalette(filtered);
}

// ── 拖拽添加节点 ──
function dragBlock(ev, blockId) {
  ev.dataTransfer.setData('blockId', blockId);
}

document.addEventListener('DOMContentLoaded', () => {
  init();

  const canvas = document.getElementById('drawflow');
  canvas.addEventListener('drop', (ev) => {
    ev.preventDefault();
    const blockId = ev.dataTransfer.getData('blockId');
    if (!blockId) return;
    addNode(blockId, ev.clientX, ev.clientY);
  });
  canvas.addEventListener('dragover', (ev) => ev.preventDefault());
});

function addNode(blockId, clientX, clientY) {
  const bt = blockTypes.find(b => b.id === blockId);
  if (!bt) return;

  // 计算画布内坐标
  const canvasEl = document.getElementById('drawflow');
  const rect = canvasEl.getBoundingClientRect();
  const x = clientX - rect.left;
  const y = clientY - rect.top;

  // 构建默认参数
  const data = {};
  (bt.params || []).forEach(p => { data[p.key] = p.default; });

  // 构建节点 HTML
  const color = catColors[bt.category] || '#64748b';
  const paramsHtml = (bt.params || []).map(p =>
    `<div class="param-row"><span>${p.label || p.key}</span><span class="param-val">${data[p.key]}</span></div>`
  ).join('');

  const html = `
    <div>
      <div class="node-title" style="border-left: 3px solid ${color}; padding-left: 8px;">
        ${bt.name}
      </div>
      <div class="node-type">${bt.id}</div>
      ${paramsHtml ? `<div class="node-params">${paramsHtml}</div>` : ''}
    </div>
  `;

  const nodeId = editor.addNode(
    bt.id,           // name
    bt.inputs,       // num inputs
    bt.outputs,      // num outputs
    x, y,            // position
    bt.id,           // class
    data,            // data
    html             // html
  );

  return nodeId;
}

// ── 属性面板 ──
function showProperties(nodeId) {
  const node = editor.getNodeFromId(nodeId);
  if (!node) return;

  const bt = blockTypes.find(b => b.id === node.name);
  if (!bt) return;

  const params = bt.params || [];
  const data = node.data || {};

  let html = `
    <div style="margin-bottom:16px;">
      <div style="font-size:14px; font-weight:600; margin-bottom:4px;">${bt.name}</div>
      <div style="font-size:11px; color:var(--text-light);">节点 #${nodeId} (${bt.id})</div>
    </div>
  `;

  if (params.length === 0) {
    html += '<div style="color:var(--text-light); font-size:13px;">无可配置参数</div>';
  } else {
    params.forEach(p => {
      const val = data[p.key] !== undefined ? data[p.key] : p.default;
      html += `
        <div class="form-group">
          <label>${p.label || p.key}</label>
          <input type="${p.type || 'text'}" class="form-control" value="${val}"
                 data-key="${p.key}" onchange="updateNodeParam(${nodeId}, '${p.key}', this)">
        </div>
      `;
    });
  }

  html += `
    <div style="margin-top:20px; padding-top:12px; border-top:1px solid var(--border);">
      <button class="btn btn-danger btn-sm" style="width:100%;"
              onclick="editor.removeNodeId('node-${nodeId}'); selectedNodeId=null;">
        删除此节点
      </button>
    </div>
  `;

  document.getElementById('propsContent').innerHTML = html;
}

function updateNodeParam(nodeId, key, input) {
  const node = editor.getNodeFromId(nodeId);
  if (!node) return;

  let val = input.value;
  if (input.type === 'number') val = parseFloat(val) || 0;
  node.data[key] = val;

  // 更新节点内显示
  const bt = blockTypes.find(b => b.id === node.name);
  if (bt) {
    const color = catColors[bt.category] || '#64748b';
    const paramsHtml = (bt.params || []).map(p =>
      `<div class="param-row"><span>${p.label || p.key}</span><span class="param-val">${node.data[p.key]}</span></div>`
    ).join('');
    const html = `
      <div>
        <div class="node-title" style="border-left: 3px solid ${color}; padding-left: 8px;">
          ${bt.name}
        </div>
        <div class="node-type">${bt.id}</div>
        ${paramsHtml ? `<div class="node-params">${paramsHtml}</div>` : ''}
      </div>
    `;
    editor.drawflow.drawflow.Home.data[nodeId].html = html;
    const nodeEl = document.querySelector(`#node-${nodeId} .drawflow_content_node`);
    if (nodeEl) nodeEl.innerHTML = html;
  }
}

// ── 保存 / 加载 / 清空 ──
async function saveModel() {
  const name = document.getElementById('modelName').value.trim() || 'default';
  const exportData = editor.export();
  await api('/api/model/save', {
    method: 'POST',
    body: { name, drawflow: exportData }
  });
  showToast(`模型 "${name}" 已保存`, 'success');
}

async function loadModel() {
  const name = document.getElementById('modelName').value.trim() || 'default';
  try {
    const data = await api(`/api/model/load/${name}`);
    if (data.drawflow) {
      editor.import(data.drawflow);
      showToast(`模型 "${name}" 已加载`, 'success');
    }
  } catch (e) {
    // 列出可用模型
    const models = await api('/api/model/list');
    if (models.length > 0) {
      const names = models.map(m => m.name).join(', ');
      showToast(`可用模型: ${names}`, 'info');
    } else {
      showToast('暂无已保存的模型', 'info');
    }
  }
}

function clearCanvas() {
  if (confirm('确定清空画布？')) {
    editor.clear();
    showToast('画布已清空', 'info');
  }
}
</script>
{% endblock %}
