{% extends "base.html" %}
{% set active_page = "canvas_" + layer|lower %}
{% block title %}{{ layer }} - {{ page_name }} - LeDCSsim{% endblock %}

{% block content %}
<div class="canvas-page">
  <!-- 工具栏 -->
  <div class="canvas-toolbar">
    <div class="toolbar-left">
      <span class="toolbar-title">{{ layer }} - {{ page_name }}</span>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="saveModel()" title="保存 Ctrl+S">&#128190;</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="engine.undo();updateDirtyIndicator()" title="撤销 Ctrl+Z">&#8630;</button>
      <button class="toolbar-btn" onclick="engine.redo();updateDirtyIndicator()" title="重做 Ctrl+Y">&#8631;</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="engine.zoomIn()">&#43;</button>
      <button class="toolbar-btn" onclick="engine.zoomOut()">&#8722;</button>
      <button class="toolbar-btn" onclick="engine.zoomReset()">1:1</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="engine.toggleGrid()">&#9783;</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="LogicChecker.runCheck(engine)" title="逻辑检查 Ctrl+Shift+C">&#128737; 检查</button>
      <button class="toolbar-btn" onclick="CrossPageNav.openSearch()" title="搜索 Ctrl+K">&#128269; 搜索</button>
      <div class="toolbar-sep"></div>
    </div>
    <div class="toolbar-right">
      <span id="opcDot" title="NTVDPU 通讯状态" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#666;margin-right:4px;vertical-align:middle;"></span>
      <select class="toolbar-input" id="simMode" style="width:auto;">
        <option value="offline">离线</option>
        <option value="online">在线</option>
      </select>
      <input type="number" class="toolbar-input" id="cfgDuration" value="60" style="width:50px;" title="运行时长(s)">
      <span style="font-size:11px;color:var(--text-light)">s</span>
      <button class="toolbar-btn" id="btnRun" onclick="startSim()" style="color:#10b981;font-weight:700;">&#9654; 运行</button>
      <button class="toolbar-btn" id="btnStop" onclick="stopSim()" style="color:#ef4444;display:none;">&#9632; 停止</button>
      <span class="zoom-indicator" id="simInfo">已停止</span>
    </div>
  </div>

  <div class="canvas-body canvas-two-col">
    <!-- 功能块面板 -->
    <div class="block-palette" id="palette">
      <div class="palette-search">
        <input type="text" class="form-control" placeholder="搜索功能块..." oninput="filterBlocks(this.value)">
      </div>
      <div class="palette-content" id="paletteContent">加载中...</div>
    </div>

    <!-- 画布 -->
    <div class="canvas-area grid-dots" id="canvasArea">
      <div id="drawflow"></div>
    </div>
  </div>

  <!-- 底部仿真状态栏 -->
  <div class="sim-panel" id="simPanel" style="display:none;">
    <div class="sim-status">
      <span class="sim-dot running"></span>
      <strong>运行中</strong>
    </div>
    <span class="sim-info" id="simTime">t=0.0s</span>
    <span class="sim-info" id="simSteps">step=0</span>
    <div style="flex:1;"></div>
    <button class="toolbar-btn" onclick="stopSim()" style="color:#ef4444;">&#9632; 停止仿真</button>
  </div>
</div>

<!-- 信号选择弹窗 -->
<div class="modal-overlay" id="signalPicker">
  <div class="modal" style="width:500px;">
    <div class="modal-header">
      <h3 id="pickerTitle">选择信号</h3>
      <button class="modal-close" onclick="closePicker()">&times;</button>
    </div>
    <div class="modal-body" style="max-height:400px;overflow-y:auto;">
      <input type="text" class="form-control" placeholder="搜索..." style="margin-bottom:10px;" oninput="filterPickerItems(this.value)">
      <div id="pickerList"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const PAGE_ID = {{ page_id|tojson }};
const PAGE_LAYER = {{ layer|tojson }};

let engine = null;
let blockDefs = [];
let categories = [];
let ioSignals = [];
let pendingDrop = null;
let monitorTimer = null;
let simRunning = false;

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', async () => {
  engine = new CanvasEngine('drawflow', { grid: 'dots', mode: 'config' });

  try {
    const [blocksData, catsData, sigsData] = await Promise.all([
      api('/api/blocks'),
      api('/api/blocks/categories'),
      api('/api/signals'),
    ]);
    blockDefs = blocksData;
    categories = catsData;
    ioSignals = sigsData.signals || [];
    blockDefs.forEach(b => engine.registerBlock(b));

    renderPalette();
  } catch(e) { console.error('初始化失败:', e); }

  // 启用浮动调试小窗
  engine.enableInspector();

  // 启用框选
  engine.enableBoxSelect();
  engine.onBoxSelected(ids => {
    document.getElementById('btnEncap').style.display = ids.length >= 2 ? '' : 'none';
  });

  await autoLoadModel();

  // 初始化新模块
  CrossPageNav.init(engine);
  LogicChecker.init(engine);
  ConnRecommend.init(engine);

  // 画布变更时更新标题栏脏标记
  engine._onCanvasChanged = () => updateDirtyIndicator();

  // 快捷键
  document.addEventListener('keydown', (e) => {
    // 忽略输入框中的按键
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

    if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveModel(); }
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); engine.undo(); updateDirtyIndicator(); }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); engine.redo(); updateDirtyIndicator(); }
    if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) { e.preventDefault(); LogicChecker.runCheck(engine); return; }
    if (e.ctrlKey && !e.shiftKey && (e.key === 'c' || e.key === 'C')) {
      engine.copySelected() && showToast('已复制', 'info');
    }
    if (e.ctrlKey && e.key === 'v' && !simRunning) {
      e.preventDefault();
      engine.pasteClipboard() && showToast('已粘贴', 'info');
      updateDirtyIndicator();
    }
    if (e.key === 'Delete' && !simRunning) { engine.removeSelected(); }
    // 方向键微调节点位置：默认 5px，Shift 按 1px 精调
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key) && !simRunning) {
      const step = e.shiftKey ? 1 : 5;
      const map = { ArrowUp: [0,-step], ArrowDown: [0,step], ArrowLeft: [-step,0], ArrowRight: [step,0] };
      if (engine.moveSelected(map[e.key][0], map[e.key][1])) {
        e.preventDefault();
        updateDirtyIndicator();
      }
    }
  });

  // 拖放
  const canvas = document.getElementById('canvasArea');
  canvas.addEventListener('drop', handleDrop);
  canvas.addEventListener('dragover', e => e.preventDefault());

  // 离开页面前自动保存
  window.addEventListener('beforeunload', () => {
    if (engine && engine.isDirty()) {
      // 同步发送保存请求（beforeunload 中不能用 async）
      const data = JSON.stringify({ name: PAGE_ID, drawflow: engine.exportJSON(), layer: PAGE_LAYER });
      navigator.sendBeacon('/api/model/save', new Blob([data], { type: 'application/json' }));
    }
  });

  // 覆写全局导航守卫：自动保存，不弹框
  window.beforeNavigate = async function() {
    if (engine && engine.isDirty()) {
      await saveModel();
    }
    return true;
  };

  // 拦截侧边栏导航链接
  document.querySelectorAll('.sidebar a[href]').forEach(a => {
    a.addEventListener('click', async (e) => {
      if (!engine || !engine.isDirty()) return;
      e.preventDefault();
      await window.beforeNavigate();
      window.location.href = a.getAttribute('href');
    });
  });

  checkSimStatus();
  opcPingLoop();
});

// ── OPC 通讯状态 ──
async function opcPingLoop() {
  const dot = document.getElementById('opcDot');
  async function ping() {
    try {
      const r = await api('/api/opc/ping');
      dot.style.background = r.ok ? '#10b981' : '#ef4444';
      dot.title = r.ok ? 'NTVDPU 通讯正常' : 'NTVDPU 通讯异常';
    } catch(e) {
      dot.style.background = '#ef4444';
      dot.title = 'NTVDPU 通讯异常';
    }
  }
  await ping();
  setInterval(ping, 5000);
}

// ── 面板 ──
function renderPalette() {
  const grouped = {};
  categories.forEach(c => { grouped[c.id] = { cat: c, blocks: [] }; });
  blockDefs.forEach(b => {
    const cid = b.category || 'signal';
    if (!grouped[cid]) grouped[cid] = { cat: {id:cid,name:cid,color:'#64748b'}, blocks: [] };
    grouped[cid].blocks.push(b);
  });

  document.getElementById('paletteContent').innerHTML = Object.entries(grouped)
    .filter(([_,g]) => g.blocks.length > 0)
    .map(([catId, g]) => `
      <div class="palette-category">
        <div class="palette-category-title" onclick="this.parentElement.classList.toggle('collapsed')">
          <span class="palette-arrow">&#9660;</span>
          <span style="color:${g.cat.color}">&#9632;</span> ${g.cat.name}
          <span class="palette-count">${g.blocks.length}</span>
        </div>
        <div class="palette-items">
          ${g.blocks.map(b => `
            <div class="palette-block" draggable="true" ondragstart="dragBlock(event,'${b.id}')"
                 title="${b.description||b.name}" data-search="${b.id} ${b.name} ${b.description||''}">
              <span class="palette-block-id" style="color:${g.cat.color}">${b.id}</span>
              <span class="palette-block-name">${b.name}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
}

function filterBlocks(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.palette-block').forEach(el => {
    el.style.display = (!q || (el.dataset.search||'').toLowerCase().includes(q)) ? '' : 'none';
  });
}

// ── 拖放 ──
function dragBlock(ev, id) { ev.dataTransfer.setData('blockId', id); }

function handleDrop(ev) {
  ev.preventDefault();
  if (simRunning) return;
  const blockId = ev.dataTransfer.getData('blockId');
  if (!blockId) return;

  // 屏幕坐标 → 画布逻辑坐标（考虑缩放和平移）
  const editor = engine.getEditor();
  const rect = document.getElementById('drawflow').getBoundingClientRect();
  const zoom = editor.zoom || 1;
  const canvasX = editor.canvas_x || 0;
  const canvasY = editor.canvas_y || 0;
  const x = (ev.clientX - rect.left - canvasX) / zoom;
  const y = (ev.clientY - rect.top - canvasY) / zoom;

  if (blockId === 'input' || blockId === 'output') {
    pendingDrop = { blockId, x, y };
    showSignalPicker(blockId === 'input' ? 'input' : 'output');
    return;
  }
  engine.addBlock(blockId, x, y);
}

// ── 仿真控制 ──
async function startSim() {
  const mode = document.getElementById('simMode').value;
  const duration = parseFloat(document.getElementById('cfgDuration').value) || 60;
  await saveModel();
  try {
    await api('/api/sim/start', {
      method: 'POST',
      body: { mode, duration, step_size: 0.2 }
    });
    enterMonitorMode();
    showToast('仿真已启动', 'success');
  } catch(e) {}
}

async function stopSim() {
  try { await api('/api/sim/stop', { method: 'POST' }); showToast('仿真已停止', 'info'); } catch(e) {}
  exitMonitorMode();
}

function enterMonitorMode() {
  simRunning = true;
  engine.setMode('monitor');
  document.getElementById('btnRun').style.display = 'none';
  document.getElementById('btnStop').style.display = '';
  document.getElementById('simPanel').style.display = 'flex';
  document.getElementById('simInfo').textContent = '运行中';
  document.getElementById('palette').style.pointerEvents = 'none';
  document.getElementById('palette').style.opacity = '0.5';

  monitorTimer = setInterval(async () => {
    try {
      const s = await api('/api/sim/status');
      if (!s.running) {
        exitMonitorMode();
        if (s.error) {
          showToast('仿真异常: ' + s.error, 'error');
        } else {
          showToast('仿真已完成', 'info');
        }
        return;
      }
      document.getElementById('simTime').textContent = `t=${(s.sim_time||0).toFixed(1)}s`;
      document.getElementById('simSteps').textContent = `step=${s.step_count||0}`;
      if (s.latest) engine.updateMonitorValues(s.latest);
    } catch(e) {}
  }, 500);
}

function exitMonitorMode() {
  simRunning = false;
  engine.setMode('config');
  if (monitorTimer) { clearInterval(monitorTimer); monitorTimer = null; }
  document.getElementById('btnRun').style.display = '';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('simPanel').style.display = 'none';
  document.getElementById('simInfo').textContent = '已停止';
  document.getElementById('palette').style.pointerEvents = '';
  document.getElementById('palette').style.opacity = '';
}

async function checkSimStatus() {
  try { const s = await api('/api/sim/status'); if (s.running) enterMonitorMode(); } catch(e) {}
}

// ── 脏标记 ──
function updateDirtyIndicator() {
  if (!engine) return;
  const title = document.querySelector('.toolbar-title');
  const base = `{{ layer }} - {{ page_name }}`;
  title.textContent = engine.isDirty() ? base + ' *' : base;
}

// ── 保存/加载 ──
async function saveModel() {
  await api('/api/model/save', { method:'POST', body:{ name: PAGE_ID, drawflow: engine.exportJSON(), layer: PAGE_LAYER }});
  engine.markSaved();
  updateDirtyIndicator();
  showToast(`"${PAGE_ID}" 已保存`, 'success');
  // 保存后静默检查
  try { LogicChecker.runSilent(engine); } catch(e) {}
}

async function autoLoadModel() {
  try {
    const d = await api(`/api/model/load/${PAGE_ID}`);
    if (d.drawflow) engine.importJSON(d.drawflow);
  } catch(e) {}
}

// ── 信号选择 ──
function showSignalPicker(dir) {
  document.getElementById('pickerTitle').textContent = dir==='input' ? '选择输入信号' : '选择输出信号';
  const filtered = ioSignals.filter(s => s.direction === dir);
  document.getElementById('pickerList').innerHTML = filtered.map(s =>
    `<div class="picker-item" onclick="confirmPick('${s.name}','${s.description||''}')">
      <strong>${s.name}</strong> <span style="font-size:11px;color:var(--text-light)">${s.description||''}</span>
    </div>`
  ).join('') || '<div style="padding:20px;text-align:center;color:var(--text-light)">无信号</div>';
  document.getElementById('signalPicker').classList.add('active');
}
function confirmPick(name, desc) {
  if (!pendingDrop) return;
  engine.addBlock(pendingDrop.blockId, pendingDrop.x, pendingDrop.y, { tag: name });
  closePicker();
}
function closePicker() {
  document.getElementById('signalPicker').classList.remove('active');
  pendingDrop = null;
}
function filterPickerItems(q) {
  document.querySelectorAll('.picker-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}
</script>
{% endblock %}
