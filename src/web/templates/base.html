<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LeDCSsim{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/canvas.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="app-layout">
    <!-- 侧边栏 -->
    <nav class="sidebar">
      <div class="sidebar-brand">
        <h1>LeDCSsim</h1>
        <div class="subtitle">DCS 协调控制仿真平台</div>
      </div>

      <div class="sidebar-nav">
        <a href="/" class="nav-item {% if active_page == 'index' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
          </svg>
          <span>总览</span>
        </a>

        <div style="padding:12px 20px 4px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#475569;">逻辑层级</div>

        <a href="/io" class="nav-item {% if active_page == 'io' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5.05 3.636a1 1 0 010 1.414 7 7 0 000 9.9 1 1 0 11-1.414 1.414 9 9 0 010-12.728 1 1 0 011.414 0zm9.9 0a9 9 0 010 12.728 1 1 0 11-1.414-1.414 7 7 0 000-9.9 1 1 0 011.414-1.414zM7.879 6.464a1 1 0 010 1.414 3 3 0 000 4.243 1 1 0 11-1.415 1.414 5 5 0 010-7.07 1 1 0 011.415 0zm4.242 0a5 5 0 010 7.072 1 1 0 01-1.415-1.415 3 3 0 000-4.242 1 1 0 011.415-1.415zM10 9a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd"/>
          </svg>
          <span>IO 层</span>
        </a>
        <a href="/il" class="nav-item {% if active_page == 'il' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4zm14 4H2v6a2 2 0 002 2h12a2 2 0 002-2V8zm-7 2a1 1 0 10-2 0v2a1 1 0 102 0v-2z"/>
          </svg>
          <span>IL 层 <small style="opacity:.5">预处理</small></span>
        </a>
        <a href="/ib" class="nav-item {% if active_page == 'ib' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/>
          </svg>
          <span>IB 层 <small style="opacity:.5">逻辑组态</small></span>
        </a>
        <a href="/l3" class="nav-item {% if active_page == 'l3' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
          <span>L3 层 <small style="opacity:.5">封装实现</small></span>
        </a>

        <div style="padding:12px 20px 4px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#475569;">运行</div>

        <a href="/run" class="nav-item {% if active_page == 'run' %}active{% endif %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
          </svg>
          <span>仿真运行</span>
        </a>
      </div>

      <div class="sidebar-footer">
        v0.2 &middot; H5000M 架构 &middot; DPU3013
      </div>
    </nav>

    <!-- 主内容区 -->
    <div class="main-content">
      {% block content %}{% endblock %}
    </div>
  </div>

  <!-- 通知容器 -->
  <div class="toast-container" id="toasts"></div>

  <script>
    // 全局 toast 通知
    function showToast(msg, type = 'info') {
      const container = document.getElementById('toasts');
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
    }

    // 全局 API 请求封装
    async function api(url, options = {}) {
      if (options.body && typeof options.body === 'object') {
        options.headers = { 'Content-Type': 'application/json', ...options.headers };
        options.body = JSON.stringify(options.body);
      }
      const resp = await fetch(url, options);
      const data = await resp.json();
      if (!resp.ok) {
        showToast(data.error || '请求失败', 'error');
        throw new Error(data.error);
      }
      return data;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.js"></script>
  <script src="{{ url_for('static', filename='js/canvas-engine.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
