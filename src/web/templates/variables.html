{% extends "base.html" %}
{% set active_page = "variables" %}
{% block title %}变量管理 - LeDCSsim{% endblock %}

{% block content %}
<div style="padding:16px 24px; height:calc(100vh - 52px); display:flex; flex-direction:column; overflow:hidden;">
  <!-- 顶部工具栏 -->
  <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-shrink:0;">
    <h2 style="font-size:16px; font-weight:600; margin:0;">变量管理</h2>
    <span style="color:#94a3b8; font-size:12px;" id="var-count"></span>
    <div style="flex:1;"></div>
    <input type="text" id="var-search" placeholder="搜索变量..." style="padding:5px 10px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; width:180px;">
    <button onclick="syncFromGraph()" style="padding:5px 12px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; cursor:pointer; background:#fff;">同步仿真变量</button>
    <button onclick="showAddDialog()" style="padding:5px 12px; border:1px solid #1e293b; border-radius:4px; font-size:12px; cursor:pointer; background:#1e293b; color:#fff;">+ 添加变量</button>
  </div>

  <!-- 变量表格 -->
  <div style="flex:1; overflow-y:auto; border:1px solid #e2e8f0; border-radius:4px;">
    <table style="width:100%; border-collapse:collapse; font-size:12px;">
      <thead>
        <tr style="background:#f8fafc; position:sticky; top:0; z-index:1;">
          <th style="padding:8px 12px; text-align:left; border-bottom:1px solid #e2e8f0; font-weight:600; width:40px;">#</th>
          <th style="padding:8px 12px; text-align:left; border-bottom:1px solid #e2e8f0; font-weight:600;">Tag</th>
          <th style="padding:8px 12px; text-align:left; border-bottom:1px solid #e2e8f0; font-weight:600;">名称</th>
          <th style="padding:8px 12px; text-align:left; border-bottom:1px solid #e2e8f0; font-weight:600; width:60px;">类型</th>
          <th style="padding:8px 12px; text-align:left; border-bottom:1px solid #e2e8f0; font-weight:600; width:50px;">单位</th>
          <th style="padding:8px 12px; text-align:left; border-bottom:1px solid #e2e8f0; font-weight:600;">OPC 节点</th>
          <th style="padding:8px 12px; text-align:left; border-bottom:1px solid #e2e8f0; font-weight:600;">描述</th>
          <th style="padding:8px 12px; text-align:right; border-bottom:1px solid #e2e8f0; font-weight:600; width:80px;">当前值</th>
          <th style="padding:8px 12px; text-align:center; border-bottom:1px solid #e2e8f0; font-weight:600; width:60px;">操作</th>
        </tr>
      </thead>
      <tbody id="var-tbody"></tbody>
    </table>
  </div>
</div>

<!-- 添加/编辑弹窗 -->
<div id="var-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(15,23,42,0.4); z-index:500; align-items:center; justify-content:center;">
  <div style="background:#fff; border:1px solid #d6d3d1; width:400px; max-width:90vw;">
    <div style="padding:12px 16px; border-bottom:1px solid #e2e8f0; font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:space-between;">
      <span id="modal-title">添加变量</span>
      <button onclick="closeModal()" style="border:none; background:none; font-size:18px; cursor:pointer; color:#94a3b8;">&times;</button>
    </div>
    <div style="padding:16px;">
      <div style="margin-bottom:10px;">
        <label style="display:block; font-size:11px; font-weight:500; color:#64748b; margin-bottom:3px;">Tag (唯一标识)</label>
        <input type="text" id="m-tag" style="width:100%; padding:5px 8px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; font-family:Consolas,monospace; box-sizing:border-box;">
      </div>
      <div style="margin-bottom:10px;">
        <label style="display:block; font-size:11px; font-weight:500; color:#64748b; margin-bottom:3px;">名称</label>
        <input type="text" id="m-name" style="width:100%; padding:5px 8px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; box-sizing:border-box;">
      </div>
      <div style="display:flex; gap:10px; margin-bottom:10px;">
        <div style="flex:1;">
          <label style="display:block; font-size:11px; font-weight:500; color:#64748b; margin-bottom:3px;">类型</label>
          <select id="m-type" style="width:100%; padding:5px 8px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; box-sizing:border-box;">
            <option value="AI">AI (模拟量输入)</option>
            <option value="DI">DI (开关量输入)</option>
            <option value="AO">AO (模拟量输出)</option>
            <option value="DO">DO (开关量输出)</option>
            <option value="CALC">CALC (中间变量)</option>
          </select>
        </div>
        <div style="width:80px;">
          <label style="display:block; font-size:11px; font-weight:500; color:#64748b; margin-bottom:3px;">单位</label>
          <input type="text" id="m-unit" style="width:100%; padding:5px 8px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; box-sizing:border-box;">
        </div>
      </div>
      <div style="margin-bottom:10px;">
        <label style="display:block; font-size:11px; font-weight:500; color:#64748b; margin-bottom:3px;">OPC 节点 (可选)</label>
        <input type="text" id="m-opc" placeholder="DPU3013.HW.AI010605.PV" style="width:100%; padding:5px 8px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; font-family:Consolas,monospace; box-sizing:border-box;">
      </div>
      <div style="margin-bottom:10px;">
        <label style="display:block; font-size:11px; font-weight:500; color:#64748b; margin-bottom:3px;">描述</label>
        <input type="text" id="m-desc" style="width:100%; padding:5px 8px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; box-sizing:border-box;">
      </div>
    </div>
    <div style="padding:10px 16px; border-top:1px solid #e2e8f0; display:flex; justify-content:flex-end; gap:8px;">
      <button onclick="closeModal()" style="padding:5px 14px; border:1px solid #e2e8f0; border-radius:4px; font-size:12px; cursor:pointer; background:#fff;">取消</button>
      <button onclick="saveVariable()" style="padding:5px 14px; border:1px solid #1e293b; border-radius:4px; font-size:12px; cursor:pointer; background:#1e293b; color:#fff;">保存</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let variables = [];
let editingTag = null;  // null=新增, string=编辑中的原 tag

async function loadVariables() {
  const resp = await api('/api/variables');
  variables = resp.variables || [];
  renderTable();
}

function renderTable() {
  const query = (document.getElementById('var-search').value || '').toLowerCase();
  const tbody = document.getElementById('var-tbody');
  const filtered = variables.filter(v => {
    if (!query) return true;
    return (v.tag || '').toLowerCase().includes(query) ||
           (v.name || '').toLowerCase().includes(query) ||
           (v.description || '').toLowerCase().includes(query);
  });

  document.getElementById('var-count').textContent = `共 ${variables.length} 个变量`;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="padding:40px; text-align:center; color:#94a3b8;">暂无变量</td></tr>';
    return;
  }

  const typeColors = {
    AI: '#10b981', DI: '#8b5cf6', AO: '#3b82f6', DO: '#ec4899', CALC: '#f59e0b'
  };

  tbody.innerHTML = filtered.map((v, i) => {
    const tc = typeColors[v.type] || '#64748b';
    const cv = v.current_value !== undefined ? Number(v.current_value).toFixed(2) : '-';
    return `<tr style="border-bottom:1px solid #f1f5f9;">
      <td style="padding:6px 12px; color:#94a3b8;">${i + 1}</td>
      <td style="padding:6px 12px; font-family:Consolas,monospace; font-weight:600;">${esc(v.tag)}</td>
      <td style="padding:6px 12px;">${esc(v.name || '')}</td>
      <td style="padding:6px 12px;"><span style="display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; font-weight:600; color:#fff; background:${tc};">${v.type}</span></td>
      <td style="padding:6px 12px; color:#64748b;">${esc(v.unit || '')}</td>
      <td style="padding:6px 12px; font-family:Consolas,monospace; font-size:11px; color:#64748b;">${esc(v.opc_node || '')}</td>
      <td style="padding:6px 12px; color:#64748b; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(v.description || '')}</td>
      <td style="padding:6px 12px; text-align:right; font-family:Consolas,monospace;">${cv}</td>
      <td style="padding:6px 12px; text-align:center;">
        <button onclick="editVariable('${esc(v.tag)}')" style="border:none; background:none; cursor:pointer; font-size:12px; color:#3b82f6; padding:2px 4px;" title="编辑">&#9998;</button>
        <button onclick="deleteVariable('${esc(v.tag)}')" style="border:none; background:none; cursor:pointer; font-size:12px; color:#ef4444; padding:2px 4px;" title="删除">&times;</button>
      </td>
    </tr>`;
  }).join('');
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showAddDialog() {
  editingTag = null;
  document.getElementById('modal-title').textContent = '添加变量';
  document.getElementById('m-tag').value = '';
  document.getElementById('m-tag').disabled = false;
  document.getElementById('m-name').value = '';
  document.getElementById('m-type').value = 'CALC';
  document.getElementById('m-unit').value = '';
  document.getElementById('m-opc').value = '';
  document.getElementById('m-desc').value = '';
  document.getElementById('var-modal').style.display = 'flex';
}

function editVariable(tag) {
  const v = variables.find(x => x.tag === tag);
  if (!v) return;
  editingTag = tag;
  document.getElementById('modal-title').textContent = '编辑变量';
  document.getElementById('m-tag').value = v.tag;
  document.getElementById('m-tag').disabled = true;
  document.getElementById('m-name').value = v.name || '';
  document.getElementById('m-type').value = v.type || 'CALC';
  document.getElementById('m-unit').value = v.unit || '';
  document.getElementById('m-opc').value = v.opc_node || '';
  document.getElementById('m-desc').value = v.description || '';
  document.getElementById('var-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('var-modal').style.display = 'none';
}

async function saveVariable() {
  const data = {
    tag: document.getElementById('m-tag').value.trim(),
    name: document.getElementById('m-name').value.trim(),
    type: document.getElementById('m-type').value,
    unit: document.getElementById('m-unit').value.trim(),
    opc_node: document.getElementById('m-opc').value.trim(),
    description: document.getElementById('m-desc').value.trim(),
  };
  if (!data.tag) { showToast('tag 不能为空', 'error'); return; }

  try {
    if (editingTag) {
      await api(`/api/variables/${encodeURIComponent(editingTag)}`, { method: 'PUT', body: data });
    } else {
      await api('/api/variables', { method: 'POST', body: data });
    }
    closeModal();
    loadVariables();
    showToast('保存成功');
  } catch(e) {}
}

async function deleteVariable(tag) {
  if (!confirm(`确定删除变量 "${tag}"？`)) return;
  try {
    await api(`/api/variables/${encodeURIComponent(tag)}`, { method: 'DELETE' });
    loadVariables();
    showToast('已删除');
  } catch(e) {}
}

async function syncFromGraph() {
  try {
    const resp = await api('/api/variables/sync-graph', { method: 'POST' });
    if (resp.added && resp.added.length > 0) {
      showToast(`同步了 ${resp.added.length} 个变量`);
    } else {
      showToast('无新变量需要同步');
    }
    loadVariables();
  } catch(e) {}
}

// 搜索
document.getElementById('var-search').addEventListener('input', renderTable);

// 初始加载
loadVariables();
</script>
{% endblock %}
